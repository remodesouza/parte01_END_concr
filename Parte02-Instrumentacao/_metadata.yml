title: Curso de Especialização em Engenharia Ferroviária - Módulo 8 - Infraestrutura ferroviária
subtitle: "Instrumentação e Monitoração de Estruturas e Fundações"
author: "Prof. Remo Magalhães de Souza, Eng. Civil, M.Sc., Ph.D."

format:
  revealjs:
    slide-level: 2
    width: 2000
    height: 1125
    margin: 0.02
    css: slides/includes/slides-layout.css
    filters:
      - slides/filters/normalize_carousel_attrs.lua
      - slides/filters/slide_templates.py
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
          <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
          <script>
            document.addEventListener('DOMContentLoaded', function() {
              GLightbox({
                selector: 'img.zoomable, .tpl-text-carousel img',
                openEffect: 'zoom',
                closeEffect: 'zoom'
              });
            });
          </script>
