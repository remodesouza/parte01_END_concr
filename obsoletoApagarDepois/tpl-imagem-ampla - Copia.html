<section class="tpl-slide tpl-imagem-ampla">
  <h2>{{title}}</h2>
  {{images_html}}
</section>

<style>
  .tpl-slide.tpl-imagem-ampla {
    position: relative;
    min-height: 680px;
  }

  .tpl-imagem-ampla .tpl-carousel {
    position: relative;
    width: 92%;
    margin: 0 auto;
    max-width: 980px;
    padding: 0 56px 64px;
    perspective: 1200px;
  }

  .tpl-imagem-ampla .tpl-carousel-viewport {
    position: relative;
    min-height: 420px;
  }

  .tpl-imagem-ampla .tpl-carousel-item {
    margin: 0;
    opacity: 0;
    pointer-events: none;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-origin: center center;
    transform: rotateY(70deg) scale(0.94);
    transition: transform 320ms ease, opacity 240ms ease;
  }

  .tpl-imagem-ampla .tpl-carousel-item.is-active {
    opacity: 1;
    pointer-events: auto;
    z-index: 1;
    transform: rotateY(0deg) scale(1);
  }

  .tpl-imagem-ampla .tpl-carousel-item.is-leaving {
    opacity: 0;
    transform: rotateY(-70deg) scale(0.94);
  }

  .tpl-imagem-ampla .tpl-carousel-item img {
    display: block;
    max-height: 420px;
    object-fit: contain;
  }

  .tpl-imagem-ampla .tpl-carousel-arrow {
    position: absolute;
    top: calc(50% - 24px);
    width: 40px;
    height: 40px;
    border: 0;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.65);
    color: #fff;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    z-index: 2;
  }

  .tpl-imagem-ampla .tpl-carousel-arrow:hover {
    background: rgba(0, 0, 0, 0.82);
  }

  .tpl-imagem-ampla .tpl-carousel-prev {
    left: 4px;
  }

  .tpl-imagem-ampla .tpl-carousel-next {
    right: 4px;
  }

  .tpl-imagem-ampla .tpl-carousel-caption {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    width: min(820px, calc(100% - 140px));
    text-align: center;
    font-size: 0.74em;
    line-height: 1.35;
    color: inherit;
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 0;
    font-family: inherit;
    font-weight: inherit;
  }

  .tpl-imagem-ampla .tpl-carousel-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
  }

  .tpl-imagem-ampla .tpl-carousel-dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.35);
  }

  .tpl-imagem-ampla .tpl-carousel-dot.is-active {
    background: rgba(255, 255, 255, 0.9);
  }

  @media (max-width: 1200px) {
    .tpl-slide.tpl-imagem-ampla {
      min-height: 600px;
    }

    .tpl-imagem-ampla .tpl-carousel {
      padding: 0 44px;
    }

    .tpl-imagem-ampla .tpl-carousel-viewport {
      min-height: 360px;
    }

    .tpl-imagem-ampla .tpl-carousel-item img {
      max-height: 360px;
    }

    .tpl-imagem-ampla .tpl-carousel-caption {
      width: calc(100% - 108px);
    }
  }
</style>

<script>
  (function () {
    if (window.__tplManualCarouselInit) {
      return;
    }
    window.__tplManualCarouselInit = true;

    function setActive(carousel, nextIndex) {
      var items = carousel.querySelectorAll('.tpl-carousel-item');
      var dots = carousel.querySelectorAll('.tpl-carousel-dot');
      var caption = carousel.querySelector('[data-carousel-caption]');
      if (!items.length) {
        return;
      }

      var index = ((nextIndex % items.length) + items.length) % items.length;
      var previousIndex = Number(carousel.dataset.index || '0');
      carousel.dataset.index = String(index);

      items.forEach(function (item, idx) {
        if (idx === previousIndex && idx !== index) {
          item.classList.add('is-leaving');
          window.setTimeout(function () {
            item.classList.remove('is-leaving');
          }, 340);
        }
        item.classList.toggle('is-active', idx === index);
      });
      dots.forEach(function (dot, idx) {
        dot.classList.toggle('is-active', idx === index);
      });

      if (caption) {
        caption.textContent = items[index].dataset.caption || '';
      }
    }

    document.querySelectorAll('.tpl-carousel[data-carousel]').forEach(function (carousel) {
      if (carousel.dataset.bound === '1') {
        return;
      }
      carousel.dataset.bound = '1';

      var prev = carousel.querySelector('.tpl-carousel-prev');
      var next = carousel.querySelector('.tpl-carousel-next');
      var current = Number(carousel.dataset.index || '0');
      setActive(carousel, current);

      if (prev) {
        prev.addEventListener('click', function () {
          var idx = Number(carousel.dataset.index || '0');
          setActive(carousel, idx - 1);
        });
      }

      if (next) {
        next.addEventListener('click', function () {
          var idx = Number(carousel.dataset.index || '0');
          setActive(carousel, idx + 1);
        });
      }
    });
  })();
</script>
