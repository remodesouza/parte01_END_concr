name: Render Quarto Slides

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Parte01-END-concreto/**/*.qmd"
      - "Parte01-END-concreto/_quarto.yml"
      - "Parte01-END-concreto/slides/**"
      - "Parte02-Instrumentacao/**/*.qmd"
      - "Parte02-Instrumentacao/_metadata.yml"
      - "Parte02-Instrumentacao/slides/**"

permissions:
  contents: write

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install panflute

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Part 1
        run: quarto render Parte01-END-concreto/princ01.qmd

      - name: Render Part 2
        run: quarto render Parte02-Instrumentacao/princ02.qmd

      - name: Commit rendered output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ci): render Quarto slides [skip ci]"
          file_pattern: |
            Parte01-END-concreto/*.html
            Parte01-END-concreto/*_files/**
            Parte02-Instrumentacao/*.html
            Parte02-Instrumentacao/*_files/**
