<section class="tpl-slide tpl-texto-imagem">
  <h2>{{title}}</h2>
  <div class="columns">
    <div class="column tpl-texto-imagem-body">
      {{body_html}}
    </div>
    <div class="column tpl-texto-imagem-media">
      <figure>
        <img class="tpl-texto-imagem-figure-img" src="{{img}}" alt="{{alt}}" />
        <figcaption>{{caption}}</figcaption>
      </figure>
    </div>
  </div>
</section>
