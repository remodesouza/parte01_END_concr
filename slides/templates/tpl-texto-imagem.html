<section class="tpl-slide tpl-texto-imagem">
  <h2>{{title}}</h2>
  <div class="columns">
    <div class="column" style="width: 58%;">
      {{body_html}}
    </div>
    <div class="column" style="width: 42%;">
      <figure>
        <img src="{{img}}" alt="{{alt}}" style="width: 100%;" />
        <figcaption>{{caption}}</figcaption>
      </figure>
    </div>
  </div>
</section>
