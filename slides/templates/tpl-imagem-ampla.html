<section class="tpl-slide tpl-imagem-ampla">
  <h2>{{title}}</h2>
  {{images_html}}
</section>

<style>
  .tpl-slide.tpl-imagem-ampla {
    position: relative;
    min-height: 680px;
  }

  .tpl-imagem-ampla .tpl-carousel {
    position: relative;
    width: 92%;
    margin: 0 auto;
    max-width: 980px;
    padding: 0 56px 64px;
    perspective: 1200px;
  }

  .tpl-imagem-ampla .tpl-carousel-nav {
    position: absolute;
    top: calc(50% - 24px);
    width: 40px;
    height: 40px;
    border: 0;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.65);
    color: #fff;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    z-index: 3;
  }

  .tpl-imagem-ampla .tpl-carousel-nav:hover {
    background: rgba(0, 0, 0, 0.82);
  }

  .tpl-imagem-ampla .tpl-carousel-prev {
    left: 4px;
  }

  .tpl-imagem-ampla .tpl-carousel-next {
    right: 4px;
  }

  .tpl-imagem-ampla .tpl-carousel-viewport {
    position: relative;
    min-height: 420px;
  }

  .tpl-imagem-ampla .tpl-carousel-item {
    margin: 0;
    opacity: 0;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-origin: center center;
    transform: rotateY(70deg) scale(0.94);
    transition: transform 320ms ease, opacity 240ms ease;
  }

  .tpl-imagem-ampla .tpl-carousel-item.is-initial,
  .tpl-imagem-ampla .tpl-carousel-item.fragment.visible,
  .tpl-imagem-ampla .tpl-carousel-item.fragment.current-fragment {
    opacity: 1;
    z-index: 1;
    transform: rotateY(0deg) scale(1);
  }

  .tpl-imagem-ampla .tpl-carousel-viewport:has(.tpl-carousel-item.fragment.current-fragment) .tpl-carousel-item.is-initial {
    opacity: 0;
    transform: rotateY(-70deg) scale(0.94);
    z-index: 0;
  }

  .tpl-imagem-ampla .tpl-carousel-item img {
    display: block;
    max-height: 420px;
    object-fit: contain;
  }

  .tpl-imagem-ampla .tpl-carousel-caption-zone {
    position: absolute;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    width: min(820px, calc(100% - 140px));
    min-height: 1.2em;
  }

  .tpl-imagem-ampla .tpl-carousel-caption {
    margin: 0;
    position: absolute;
    inset: 0;
    text-align: center;
    font-size: 0.74em;
    line-height: 1.35;
    color: inherit;
    opacity: 0;
    transition: opacity 180ms ease;
  }

  .tpl-imagem-ampla .tpl-carousel-caption.is-initial,
  .tpl-imagem-ampla .tpl-carousel-caption.fragment.visible,
  .tpl-imagem-ampla .tpl-carousel-caption.fragment.current-fragment {
    opacity: 1;
  }

  .tpl-imagem-ampla .tpl-carousel-caption-zone:has(.tpl-carousel-caption.fragment.current-fragment) .tpl-carousel-caption.is-initial {
    opacity: 0;
  }

  .tpl-imagem-ampla .tpl-carousel-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
  }

  .tpl-imagem-ampla .tpl-carousel-dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.35);
  }

  .tpl-imagem-ampla .tpl-carousel-dot.is-active {
    background: rgba(255, 255, 255, 0.9);
  }

  @media (max-width: 1200px) {
    .tpl-slide.tpl-imagem-ampla {
      min-height: 600px;
    }

    .tpl-imagem-ampla .tpl-carousel {
      padding: 0 44px;
    }

    .tpl-imagem-ampla .tpl-carousel-nav {
      width: 38px;
      height: 38px;
      font-size: 24px;
    }

    .tpl-imagem-ampla .tpl-carousel-viewport {
      min-height: 360px;
    }

    .tpl-imagem-ampla .tpl-carousel-item img {
      max-height: 360px;
    }

    .tpl-imagem-ampla .tpl-carousel-caption-zone {
      width: calc(100% - 108px);
    }
  }
</style>

<script>
  (function () {
    if (window.__tplRevealCarouselInit) {
      return;
    }
    window.__tplRevealCarouselInit = true;

    function getActiveIndex(carousel) {
      var currentFragment = carousel.querySelector('.tpl-carousel-item.fragment.current-fragment');
      if (!currentFragment) {
        return 0;
      }

      var rawIndex = Number(currentFragment.getAttribute('data-fragment-index') || '0');
      return Number.isNaN(rawIndex) ? 0 : rawIndex;
    }

    function syncDots(scope) {
      (scope || document).querySelectorAll('.tpl-carousel[data-carousel]').forEach(function (carousel) {
        var activeIndex = getActiveIndex(carousel);
        carousel.querySelectorAll('[data-carousel-dot]').forEach(function (dot) {
          dot.classList.toggle('is-active', Number(dot.getAttribute('data-carousel-dot')) === activeIndex);
        });
      });
    }

    document.addEventListener('click', function (event) {
      var button = event.target.closest('[data-carousel-nav]');
      if (!button || typeof Reveal === 'undefined') {
        return;
      }

      event.preventDefault();
      event.stopPropagation();

      if (button.getAttribute('data-carousel-nav') === 'prev') {
        if (typeof Reveal.prevFragment === 'function' && Reveal.prevFragment()) {
          return;
        }
        if (typeof Reveal.left === 'function') {
          Reveal.left();
        }
        return;
      }

      if (typeof Reveal.nextFragment === 'function' && Reveal.nextFragment()) {
        return;
      }
      if (typeof Reveal.right === 'function') {
        Reveal.right();
      }
    });

    document.addEventListener('slidechanged', function (event) {
      syncDots(event.currentSlide || document);
    });
    document.addEventListener('fragmentshown', function (event) {
      syncDots(event.fragment ? event.fragment.closest('section') || document : document);
    });
    document.addEventListener('fragmenthidden', function (event) {
      syncDots(event.fragment ? event.fragment.closest('section') || document : document);
    });

    syncDots(document);
  })();
</script>
