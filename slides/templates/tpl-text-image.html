<div class="tpl-slide tpl-text-image">
  <h2>{{title}}</h2>
  <div class="columns">
    <div class="column tpl-text-image-body">
      {{body_html}}
    </div>
    <div class="column tpl-text-image-media">
      <figure>
        <img class="tpl-text-image-figure-img" src="{{img}}" alt="{{alt}}" />
        <figcaption>{{caption}}</figcaption>
      </figure>
    </div>
  </div>
</div>
